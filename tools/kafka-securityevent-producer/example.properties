# ---------------------------------------------------------------------------
# kafka-securityevent-producer — example properties file
#
# Copy this to a scenario-specific file, e.g. scenario-high-risk.properties,
# and pass it with:
#   ./run.sh --props scenario-high-risk.properties
#
# CLI flags always override values in this file, so you can do:
#   ./run.sh --props scenario-high-risk.properties --count 10
#
# Type inference for payload fields:
#   123L or 123l  → Long      (use for _timestamp, startTimestamp, packetCount, rates…)
#   123           → Integer   (use for vectorId, sourcePort, duration…)
#   true / false  → Boolean
#   anything else → String
# ---------------------------------------------------------------------------

# ---- Producer / runner settings -------------------------------------------
# These keys are reserved and do not become payload fields.

bootstrap   = localhost:9092
# bootstrap = kafkaQA:9092      # use when running inside the lab Docker network

topic       = sdcc-mitigation-vision-defensepro-securityevents
# topic     = sdcc-mitigation-vision-defenseflow-securityevents

account-id  = 5eb04bc6af93511527471000
asset-id    = 507f1f77bcf86cd799439011
count       = 1
compress    = false
dry-run     = false


# ---- Payload field overrides -----------------------------------------------
# Any key not in the reserved list above is applied directly to the KValue
# properties map, on top of the hardcoded defaults.
# Run ./run.sh --list-fields to see all defaults.

# Identity
accountName         = testAccount
assetName           = testAsset
siteName            = testSite
scrubbingcenterName = ASH

# Attack classification
# vectorId must fall in an allowed range per attack-default-lab20.properties:
#   default_customer: 70-92, 150, 240, 450-471, 600, 700, 1000-1282, …
vectorId            = 80
vectorName          = TCP Scan
category            = AntiScanning
classification      = DDOS
risk                = High

# Status/action
# action must NOT be "Forward" to pass the default_customer filter
status              = Ongoing
action              = Drop

# Traffic — packetCount must be non-zero to pass the filter
packetCount         = 1000L
packetBandwidth     = 1000L
maxBitRate          = 10000000L

# Network
sourceAddress       = 1.1.1.2
sourcePort          = 0
targetAddress       = Multiple
targetPort          = Multiple
protocol            = TCP
