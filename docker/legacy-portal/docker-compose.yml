x-portal-build: &portal-build
  context: .
  dockerfile: Dockerfile
  additional_contexts:
    sdcc-src: ${SDCC_REPO_PATH:-../../../sdcc}
    sdcc-portal-src: ${SDCC_PORTAL_REPO_PATH:-../../../sdcc-portal}

x-device-templates-volume: &device-templates-volume
  type: bind
  source: ${SDCC_DEVICE_TEMPLATES_PATH:-../../../sdcc/sdcc/provisioning/device_templates/default}
  target: /var/lib/sdcc/core/device_templates
  read_only: true

x-common-environment: &common-environment
  SDCC_DOCKER_BOOTSTRAP_DB: "1"
  SDCC_MONGO_HOST: ${SDCC_MONGO_HOST:-mongo}
  SDCC_MONGO_PORT: ${SDCC_MONGO_PORT:-27017}
  SDCC_MONGO_DB: ${SDCC_MONGO_DB:-sdcc}
  SDCC_PORTAL_PUBLIC_URL: ${SDCC_PORTAL_PUBLIC_URL:-http://localhost:8000}
  SDCC_DEMO_BYPASS_LICENSE: ${SDCC_DEMO_BYPASS_LICENSE:-1}

x-portal-environment: &portal-environment
  <<: *common-environment
  SDCC_BACKEND_NAME: ${SDCC_BACKEND_NAME:-docker}
  SDCC_BACKEND_IP: ${SDCC_BACKEND_IP:-127.0.0.1}
  SDCC_BACKEND_ROLE: ${SDCC_BACKEND_ROLE:-hybrid}
  SDCC_TASK_TYPE: ${SDCC_TASK_TYPE:-provisioning}

x-portal-service-base: &portal-service-base
  build: *portal-build
  ports:
    - "${LEGACY_PORTAL_PORT:-8000}:8000"
  volumes:
    - *device-templates-volume

x-hybrid-backend-environment: &hybrid-backend-environment
  <<: *common-environment
  SDCC_BACKEND_NAME: ${SDCC_BACKEND_NAME:-docker}
  SDCC_BACKEND_IP: ${SDCC_BACKEND_IP:-10.20.4.20}
  SDCC_BACKEND_ROLE: hybrid
  SDCC_TASK_TYPE: ${SDCC_TASK_TYPE:-provisioning}

# Profiles are two independent dimensions — always combine one from each:
#
#   Task type (portal only):
#     execute    — no SDCC_TASK_TYPE set; portal runs in default execution mode
#     build-only — SDCC_TASK_TYPE=build; portal creates task records in the DB
#
#   Service scope (backend services):
#     minimal    — mongo + cmd-executor + incident-manager
#     full       — mongo + all backend services
#
#   Examples:
#     --profile execute   --profile minimal
#     --profile execute   --profile full
#     --profile build-only --profile minimal
#     --profile build-only --profile full
#
#   Standalone:
#     internal-mongo — mongo only (use with an external portal instance)
#     lab            — all-in-one: execute-mode portal + mongo + the full backend
#                      stack (cmd-executor, incident-manager, and every
#                      poller/aggregator). Equivalent to "execute + full" in one
#                      token; this is the Makefile default for a capable lab.

# "lab" is an all-in-one convenience profile (see the comment block above): it
# brings up the execute-mode portal + mongo + the entire backend stack, so a
# single `--profile lab` starts a fully functional lab. It is added alongside
# the existing task-type/service-scope profiles, which still work as before.
x-full-profile: &full-profile
  - full
  - lab

x-minimal-and-full-profiles: &minimal-and-full-profiles
  - minimal
  - full
  - lab

x-backend-service: &backend-service
  build: *portal-build
  profiles: *full-profile
  restart: unless-stopped
  volumes:
    - *device-templates-volume

services:
  mongo:
    image: ${LEGACY_PORTAL_MONGO_IMAGE:-mongo:8.2}
    profiles:
      - internal-mongo
      - minimal
      - full
      - lab
    ports:
      - "${LEGACY_PORTAL_MONGO_PORT:-27018}:27017"
    volumes:
      - type: bind
        source: ${LEGACY_PORTAL_MONGO_DB_PATH:-../../.tmp/legacy-portal-mongo-db}
        target: /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30

  portal:
    <<: *portal-service-base
    profiles:
      - execute
      - lab
    environment: *portal-environment

  portal-build:
    <<: *portal-service-base
    profiles:
      - build-only
    environment:
      <<: *portal-environment
      SDCC_TASK_TYPE: build

  alert-manager-aggregator:
    <<: *backend-service
    environment: *hybrid-backend-environment
    command: ["/bin/sh", "-c", "rm -f /var/lock/sdcc/sdcc-alert-manager-aggregator.lck && exec sdcc-alert-manager-aggregator.py --debug true"]

  ar-config-poller:
    <<: *backend-service
    environment: *hybrid-backend-environment
    command: ["/bin/sh", "-c", "rm -f /var/lock/sdcc/sdcc-ar-config-poller.lck && exec sdcc-ar-config-gaps.py"]

  asset-advertisement-aggregator:
