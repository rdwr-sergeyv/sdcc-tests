services:
  mongo:
    image: ${LEGACY_PORTAL_MONGO_IMAGE:-mongo:8.2}
    profiles:
      - internal-mongo
    ports:
      - "${LEGACY_PORTAL_MONGO_PORT:-27017}:27017"
    volumes:
      - type: bind
        source: ${LEGACY_PORTAL_MONGO_DB_PATH:-C:/data/db}
        target: /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30

  portal:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        sdcc-src: ${SDCC_REPO_PATH:-../../../sdcc}
        sdcc-portal-src: ${SDCC_PORTAL_REPO_PATH:-../../../sdcc-portal}
    environment:
      SDCC_DOCKER_BOOTSTRAP_DB: "1"
      SDCC_MONGO_HOST: ${SDCC_MONGO_HOST:-mongo}
      SDCC_MONGO_PORT: ${SDCC_MONGO_PORT:-27017}
      SDCC_MONGO_DB: ${SDCC_MONGO_DB:-sdcc}
      SDCC_PORTAL_PUBLIC_URL: ${SDCC_PORTAL_PUBLIC_URL:-http://localhost:8000}
      SDCC_BACKEND_NAME: ${SDCC_BACKEND_NAME:-docker}
      SDCC_BACKEND_IP: ${SDCC_BACKEND_IP:-127.0.0.1}
      SDCC_BACKEND_ROLE: ${SDCC_BACKEND_ROLE:-hybrid}
      SDCC_TASK_TYPE: ${SDCC_TASK_TYPE:-build}
      SDCC_DEMO_BYPASS_LICENSE: ${SDCC_DEMO_BYPASS_LICENSE:-1}
    ports:
      - "${LEGACY_PORTAL_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ${SDCC_DEVICE_TEMPLATES_PATH:-../../../sdcc/sdcc/provisioning/device_templates/default}
        target: /var/lib/sdcc/core/device_templates
        read_only: true

  incident-manager:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        sdcc-src: ${SDCC_REPO_PATH:-../../../sdcc}
        sdcc-portal-src: ${SDCC_PORTAL_REPO_PATH:-../../../sdcc-portal}
    environment:
      SDCC_DOCKER_BOOTSTRAP_DB: "1"
      SDCC_MONGO_HOST: ${SDCC_MONGO_HOST:-mongo}
      SDCC_MONGO_PORT: ${SDCC_MONGO_PORT:-27017}
      SDCC_MONGO_DB: ${SDCC_MONGO_DB:-sdcc}
      SDCC_PORTAL_PUBLIC_URL: ${SDCC_PORTAL_PUBLIC_URL:-http://localhost:8000}
      SDCC_BACKEND_NAME: ${SDCC_MAIN_BACKEND_NAME:-be-master}
      SDCC_BACKEND_IP: ${SDCC_MAIN_BACKEND_IP:-10.20.3.41}
      SDCC_BACKEND_ROLE: master
      SDCC_TASK_TYPE: ${SDCC_TASK_TYPE:-build}
      SDCC_DEMO_BYPASS_LICENSE: ${SDCC_DEMO_BYPASS_LICENSE:-1}
    restart: unless-stopped
    command: ["/bin/sh", "-c", "rm -f /var/lock/sdcc/sdcc-incident-manager.lck && exec sdcc-incident-manager.py --debug true"]
    volumes:
      - type: bind
        source: ${SDCC_DEVICE_TEMPLATES_PATH:-../../../sdcc/sdcc/provisioning/device_templates/default}
        target: /var/lib/sdcc/core/device_templates
        read_only: true

  cmd-executor:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        sdcc-src: ${SDCC_REPO_PATH:-../../../sdcc}
        sdcc-portal-src: ${SDCC_PORTAL_REPO_PATH:-../../../sdcc-portal}
    environment:
      SDCC_DOCKER_BOOTSTRAP_DB: "1"
      SDCC_MONGO_HOST: ${SDCC_MONGO_HOST:-mongo}
      SDCC_MONGO_PORT: ${SDCC_MONGO_PORT:-27017}
      SDCC_MONGO_DB: ${SDCC_MONGO_DB:-sdcc}
      SDCC_PORTAL_PUBLIC_URL: ${SDCC_PORTAL_PUBLIC_URL:-http://localhost:8000}
      SDCC_BACKEND_NAME: ${SDCC_MONITOR_BACKEND_NAME:-be-monitor}
      SDCC_BACKEND_IP: ${SDCC_MONITOR_BACKEND_IP:-10.20.3.42}
      SDCC_BACKEND_ROLE: monitor
      SDCC_TASK_TYPE: ${SDCC_TASK_TYPE:-build}
      SDCC_DEMO_BYPASS_LICENSE: ${SDCC_DEMO_BYPASS_LICENSE:-1}
    restart: unless-stopped
    command: ["/bin/sh", "-c", "rm -f /var/lock/sdcc/sdcc-cmd-executor.lck && exec sdcc-cmd-executor.py --debug true"]
    volumes:
      - type: bind
        source: ${SDCC_DEVICE_TEMPLATES_PATH:-../../../sdcc/sdcc/provisioning/device_templates/default}
        target: /var/lib/sdcc/core/device_templates
        read_only: true
