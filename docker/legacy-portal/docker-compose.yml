  incident-manager:
    <<: *backend-service
    profiles: *minimal-and-full-profiles
    environment: *hybrid-backend-environment
    command: ["/bin/sh", "-c", "rm -f /var/lock/sdcc/sdcc-incident-manager.lck && exec sdcc-incident-manager.py --debug true"]

  # Supervised backend node: runs multiple sdcc modules under supervisord in one
  # container (PLAN item 1: cmd-executor + incident-manager only, role=hybrid).
  # Registers as backend "hybrid-1"; no SCs assigned yet, so it sits idle.
  backend-hybrid:
    <<: *backend-service
    environment:
      <<: *hybrid-backend-environment
      SDCC_BACKEND_NAME: hybrid-1
      SDCC_BACKEND_ROLE: hybrid
      # Backends.ip_addr has a unique index, so each backend container needs a
      # distinct IP. This value is only used by SdccServiceManager for SSH
      # orchestration (not used in this container lab), so it's a placeholder.
      # Use a loopback addr like the other local backends (docker-monitor=127.0.0.3,
      # docker-main=127.0.0.2) rather than squatting a real lab-subnet IP.
      SDCC_BACKEND_IP: 127.0.0.4
    command: ["/bin/sh", "-c", "exec supervisord -c /etc/sdcc/supervisor/backend.conf"]
    volumes:
      - *device-templates-volume
      - type: bind
        source: ./supervisor
        target: /etc/sdcc/supervisor
        read_only: true

