; Supervisord profile: MINIMAL MONITOR.
;
; Defines the SAME program set as full-monitor (all pollers) so every poller program
; is visible and startable via supervisorctl on a monitor node — but only the minimal
; subset auto-starts (cmd-executor). The rest are loaded with autostart=false; start
; them on demand with `supervisorctl start <name>`.
;
; Each sdcc-*.py app also self-selects via @require_backend_roles against this
; container's SDCC_BACKEND_ROLE (monitor): poller-role apps run, others exit 0.
;
; The program blocks live in conf.d/minimal-monitor.programs.conf and are
; AUTO-GENERATED from docker-compose.yml — regenerate with
; `npm run gen-supervisor-fragments` after changing compose backend services.

[supervisord]
nodaemon=true
logfile=/var/log/sdcc/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/sdcc/supervisor/conf.d/minimal-monitor.programs.conf
