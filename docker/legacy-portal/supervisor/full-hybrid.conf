; Supervisord profile: FULL HYBRID — runs the entire backend stack.
;
; Includes every poller-role and aggregator-role program. On a hybrid backend
; (SDCC_BACKEND_ROLE=hybrid) all of them run; on a monitor-role container only the
; pollers actually start and on a master-role container only the aggregators
; (the rest exit 0 via @require_backend_roles, and autorestart=unexpected keeps
; them down). So this same file is reusable across roles — the role env decides
; what runs.
;
; The program blocks live in conf.d/{pollers,aggregators}.conf and are
; AUTO-GENERATED from docker-compose.yml — regenerate them if the compose backend
; services change.

[supervisord]
nodaemon=true
logfile=/var/log/sdcc/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/sdcc/supervisor/conf.d/pollers.conf /etc/sdcc/supervisor/conf.d/aggregators.conf
