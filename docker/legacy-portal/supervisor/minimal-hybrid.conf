; Supervisord profile: MINIMAL HYBRID.
;
; Defines the SAME program set as full-hybrid (all pollers + aggregators) so every
; backend program is visible and startable via supervisorctl on a hybrid node — but
; only the minimal subset auto-starts (cmd-executor + incident-manager). The rest are
; loaded with autostart=false; start them on demand with `supervisorctl start <name>`.
;
; Each sdcc-*.py app also self-selects via @require_backend_roles against this
; container's SDCC_BACKEND_ROLE: role-mismatched apps exit 0 immediately, so
; autorestart=unexpected keeps them down while genuinely crashed apps are restarted.
;
; The program blocks live in conf.d/minimal-hybrid.programs.conf and are
; AUTO-GENERATED from docker-compose.yml — regenerate with
; `npm run gen-supervisor-fragments` after changing compose backend services.

[supervisord]
nodaemon=true
logfile=/var/log/sdcc/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

; Control socket so `supervisorctl` (and the `sdcc` shim that delegates to it) can
; query/start/stop programs.
[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/sdcc/supervisor/conf.d/minimal-hybrid.programs.conf
