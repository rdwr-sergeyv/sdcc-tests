; Supervisord profile: FULL MONITOR — all poller-role programs, for a monitor backend.
;
; Includes only the poller group (cmd-executor + all *-poller + netflow-manager).
; Aggregators are intentionally not included (they require master/hybrid). On a
; monitor backend (SDCC_BACKEND_ROLE=monitor) every program here passes
; @require_backend_roles and runs; each one acts only on the SCs whose
; ScrubbingCenter.backend points at this backend.
;
; Program blocks live in conf.d/pollers.conf and are AUTO-GENERATED — regenerate
; with `npm run gen-supervisor-fragments` after changing compose backend services.

[supervisord]
nodaemon=true
logfile=/var/log/sdcc/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/sdcc/supervisor/conf.d/pollers.conf
